version: '3.8'

services:
  backend:
    build: ./backend
    container_name: nexus_backend
    volumes:
      - ./backend:/app
      - ./shared:/app/shared
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    networks:
      - nexus_net

  frontend:
    build: ./frontend
    container_name: nexus_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "9000:9000"
    networks:
      - nexus_net

  worker:
    build: ./workers
    container_name: nexus_worker
    volumes:
      - ./workers:/app
      - ./shared:/app/shared
    env_file: .env
    depends_on:
      - redis
    networks:
      - nexus_net

  redis:
    image: redis:7-alpine
    container_name: nexus_redis
    ports:
      - "6379:6379"
    networks:
      - nexus_net

networks:
  nexus_net:
    driver: bridge
